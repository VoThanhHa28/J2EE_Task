<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Thêm sách</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/layout :: header"></div>

<div class="container">
  <h2 class="mb-3">Thêm sách mới</h2>

  <form th:action="@{/books/add}" method="post" th:object="${book}" class="card p-4">
    <div class="mb-3">
      <label class="form-label">Tiêu đề</label>
      <input type="text" class="form-control" th:field="*{title}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Tác giả</label>
      <input type="text" class="form-control" th:field="*{author}" required>
    </div>

    <button type="submit" class="btn btn-success">💾 Thêm</button>
    <a href="/books" class="btn btn-secondary">Quay lại</a>
  </form>
</div>

<div th:replace="fragments/layout :: footer"></div>

</body>
</html>
