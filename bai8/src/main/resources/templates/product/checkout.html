<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">

<head>
  <title>Thanh toán</title>
  <style>
    .checkout-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    @media (max-width: 768px) {
      .checkout-container {
        grid-template-columns: 1fr;
      }
    }
    .checkout-form {
      background: white;
      padding: 20px;
      border-radius: 8px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .form-group.required label::after {
      content: " *";
      color: red;
    }
    .order-summary {
      background: white;
      padding: 20px;
      border-radius: 8px;
      height: fit-content;
      position: sticky;
      top: 20px;
    }
    .order-summary h4 {
      margin-bottom: 15px;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    .order-item-details {
      flex: 1;
    }
    .order-item-name {
      font-weight: 500;
      margin-bottom: 3px;
    }
    .order-item-qty {
      color: #7f8c8d;
      font-size: 12px;
    }
    .order-item-total {
      text-align: right;
      min-width: 100px;
      font-weight: 600;
      color: #e74c3c;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      font-size: 18px;
      font-weight: bold;
      color: #e74c3c;
      border-top: 2px solid #eee;
      margin-top: 10px;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-submit {
      flex: 1;
      padding: 12px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-submit:hover {
      background-color: #229954;
    }
    .btn-back {
      padding: 12px 20px;
      background-color: #95a5a6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-back:hover {
      background-color: #7f8c8d;
    }
    .alert {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    .alert-danger {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>

<body>
<div layout:fragment="content">

  <div class="d-flex justify-content-between mb-3">
    <h2>Thanh toán</h2>
    <a th:href="@{/products/cart}" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> Quay lại giỏ hàng
    </a>
  </div>

  <!-- ERROR MESSAGE -->
  <div th:if="${error}" class="alert alert-danger">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
  </div>

  <div class="checkout-container">
    <!-- LEFT SIDE: CHECKOUT FORM -->
    <form th:action="@{/products/checkout}" method="post" class="checkout-form">
      <h3>Thông tin khách hàng</h3>

      <div class="form-group required">
        <label for="customerName">Tên khách hàng:</label>
        <input type="text" id="customerName" name="customerName" required 
               th:value="${order.customerName}">
      </div>

      <div class="form-group required">
        <label for="customerEmail">Email:</label>
        <input type="email" id="customerEmail" name="customerEmail" required 
               th:value="${order.customerEmail}">
      </div>

      <div class="form-group required">
        <label for="customerPhone">Số điện thoại:</label>
        <input type="tel" id="customerPhone" name="customerPhone" required 
               th:value="${order.customerPhone}">
      </div>

      <div class="form-group required">
        <label for="customerAddress">Địa chỉ giao hàng:</label>
        <textarea id="customerAddress" name="customerAddress" required 
                  th:text="${order.customerAddress}"></textarea>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-submit">
          <i class="fas fa-check"></i> Xác nhận đặt hàng
        </button>
      </div>
    </form>

    <!-- RIGHT SIDE: ORDER SUMMARY -->
    <div class="order-summary">
      <h4>Tóm tắt đơn hàng</h4>

      <!-- Order items -->
      <div th:each="item : ${cartItems}" class="order-item">
        <div class="order-item-details">
          <div class="order-item-name" th:text="${item.productName}"></div>
          <div class="order-item-qty" th:text="'Số lượng: ' + ${item.quantity}"></div>
        </div>
        <div class="order-item-total" th:text="'₫' + ${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')}"></div>
      </div>

      <!-- Summary rows -->
      <div class="summary-row">
        <span>Tổng sản phẩm:</span>
        <span th:text="${#lists.size(cartItems)}"></span>
      </div>

      <div class="summary-row">
        <span>Phí vận chuyển:</span>
        <span>Miễn phí</span>
      </div>

      <!-- Total -->
      <div class="summary-total">
        <span>Tổng cộng:</span>
        <span th:text="'₫' + ${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')}"></span>
      </div>

      <!-- Back to cart button -->
      <a th:href="@{/products/cart}" class="btn-back" style="display: block; text-align: center; margin-top: 20px;">
        <i class="fas fa-arrow-left"></i> Quay lại giỏ hàng
      </a>
    </div>
  </div>

</div>
</body>
</html>
