<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">

<head>
  <title>Danh sách sản phẩm</title>
  <style>
    .filter-section {
      background-color: #f8f9fa;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .filter-group {
      flex: 1;
      min-width: 150px;
    }
    .filter-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .btn-search {
      padding: 8px 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .product-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .product-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background-color: #f0f0f0;
    }
    .product-info {
      padding: 15px;
    }
    .product-name {
      font-weight: 600;
      margin-bottom: 8px;
      min-height: 40px;
    }
    .product-price {
      font-size: 18px;
      color: #e74c3c;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .product-category {
      font-size: 12px;
      color: #7f8c8d;
      margin-bottom: 10px;
    }
    .product-actions {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .product-actions a {
      flex: 1;
      min-width: 70px;
      padding: 6px !important;
      font-size: 12px;
      text-align: center;
    }
    .pagination-section {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    .pagination-btn {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background-color: white;
      text-decoration: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination-btn.active {
      background-color: #007bff;
      color: white;
      border-color: #007bff;
    }
    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .pagination-info {
      text-align: center;
      color: #7f8c8d;
    }
  </style>
</head>

<body>
<div layout:fragment="content">

  <div class="d-flex justify-content-between mb-3">
    <h2>Danh sách sản phẩm</h2>
    <div>
      <a th:href="@{/products/cart}" class="btn btn-info">
        <i class="fas fa-shopping-cart"></i> Giỏ hàng
      </a>
      <a th:href="@{/products/create}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Thêm sản phẩm
      </a>
    </div>
  </div>

  <!-- FILTER AND SEARCH SECTION -->
  <div class="filter-section">
    <form th:action="@{/products}" method="get" class="filter-row">
      <!-- Search field -->
      <div class="filter-group" style="flex: 2;">
        <label for="keyword">Tìm kiếm theo tên:</label>
        <input type="text" id="keyword" name="keyword" th:value="${keyword}" 
               placeholder="Nhập tên sản phẩm...">
      </div>

      <!-- Category filter -->
      <div class="filter-group">
        <label for="categoryId">Danh mục:</label>
        <select id="categoryId" name="categoryId">
          <option value="-1">Tất cả</option>
          <option th:each="cat : ${categories}" 
                  th:value="${cat.id}" 
                  th:selected="${categoryId == cat.id}"
                  th:text="${cat.name}"></option>
        </select>
      </div>

      <!-- Sort field -->
      <div class="filter-group">
        <label for="sort">Sắp xếp:</label>
        <select id="sort" name="sort">
          <option value="">Mặc định</option>
          <option value="price-asc" th:selected="${sort == 'price-asc'}">Giá tăng dần</option>
          <option value="price-desc" th:selected="${sort == 'price-desc'}">Giá giảm dần</option>
        </select>
      </div>

      <!-- Search button -->
      <button type="submit" class="btn btn-primary btn-search">
        <i class="fas fa-search"></i> Tìm kiếm
      </button>
      
      <!-- Clear filter button -->
      <a th:href="@{/products}" class="btn btn-secondary btn-search">
        <i class="fas fa-redo"></i> Xóa bộ lọc
      </a>
    </form>
  </div>

  <!-- PRODUCTS GRID -->
  <div th:if="${products.hasContent()}" class="product-grid">
    <div th:each="product : ${products}" class="product-card">
      <img th:if="${product.image != null}"
           th:src="@{/images/{img}(img=${product.image})}"
           alt="Product Image"
           class="product-image"/>
      <img th:if="${product.image == null}"
           src="https://via.placeholder.com/280x200?text=No+Image"
           alt="No Image"
           class="product-image"/>
      
      <div class="product-info">
        <div class="product-name" th:text="${product.name}"></div>
        <div class="product-price" th:text="'₫' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></div>
        <div class="product-category" th:text="${product.category != null ? product.category.name : 'Không có danh mục'}"></div>
        
        <div class="product-actions">
          <a th:href="@{/products/add-to-cart/{id}(id=${product.id})}"
             class="btn btn-sm btn-success">
            <i class="fas fa-cart-plus"></i> Thêm
          </a>
          <a th:href="@{/products/edit/{id}(id=${product.id})}"
             class="btn btn-sm btn-secondary">
            <i class="fas fa-edit"></i> Sửa
          </a>
          <a th:href="@{/products/delete/{id}(id=${product.id})}"
             onclick="return confirm('Bạn có chắc muốn xóa?')"
             class="btn btn-sm btn-danger">
            <i class="fas fa-trash"></i> Xóa
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <div th:if="!${products.hasContent()}" class="alert alert-info text-center">
    <h5>Không tìm thấy sản phẩm</h5>
    <p>Vui lòng thử lại với các tiêu chí tìm kiếm khác.</p>
  </div>

  <!-- PAGINATION -->
  <div th:if="${products.hasContent()}" class="pagination-section">
    <!-- Previous button -->
    <a th:if="${currentPage > 0}"
       th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}"
       class="pagination-btn">
      <i class="fas fa-chevron-left"></i> Trước
    </a>
    <a th:if="${currentPage == 0}"
       class="pagination-btn"
       disabled>
      <i class="fas fa-chevron-left"></i> Trước
    </a>

    <!-- Page numbers -->
    <span th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}"
          th:if="${totalPages <= 7 || (pageNum >= currentPage - 2 && pageNum <= currentPage + 2)}">
      
      <!-- Show ellipsis -->
      <span th:if="${pageNum > 0 && pageNum < currentPage - 2 && pageNum == (currentPage - 3)}"
            style="color: #999;">...</span>
      
      <!-- Page button -->
      <a th:href="@{/products(page=${pageNum}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}"
         th:class="'pagination-btn' + (${pageNum == currentPage} ? ' active' : '')"
         th:text="${pageNum + 1}"></a>
      
      <!-- Show ellipsis -->
      <span th:if="${pageNum < totalPages - 1 && pageNum > currentPage + 2 && pageNum == (currentPage + 3)}"
            style="color: #999;">...</span>
    </span>

    <!-- Next button -->
    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}"
       class="pagination-btn">
      Tiếp <i class="fas fa-chevron-right"></i>
    </a>
    <a th:if="${currentPage >= totalPages - 1}"
       class="pagination-btn"
       disabled>
      Tiếp <i class="fas fa-chevron-right"></i>
    </a>

    <!-- Page info -->
    <div class="pagination-info" style="flex-basis: 100%; margin-top: 10px;">
      Trang <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span>
    </div>
  </div>

</div>
</body>
</html>
