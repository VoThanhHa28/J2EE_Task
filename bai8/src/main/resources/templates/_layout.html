<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* CSS để đẩy footer xuống đáy */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Chiều cao tối thiểu bằng màn hình */
            background-color: #f5f5f5;
        }
        .content-wrapper {
            flex: 1; /* Chiếm hết khoảng trống ở giữa để đẩy footer xuống */
            padding: 20px 0;
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 22px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">
            <i class="fas fa-store"></i> My Store
        </a>
    </div>
</nav>

<div class="content-wrapper">
    <div class="container">
        <div layout:fragment="content"></div>
    </div>
</div>

<footer class="text-center py-3 border-top bg-light">
    <p class="mb-0">&copy; 2026 - Phát triển ứng dụng với J2EE | Chức năng: Tìm kiếm, Lọc, Sắp xếp, Phân trang, Giỏ hàng, Đặt hàng</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
