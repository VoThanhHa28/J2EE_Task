<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS để đẩy footer xuống đáy */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Chiều cao tối thiểu bằng màn hình */
        }
        .content-wrapper {
            flex: 1; /* Chiếm hết khoảng trống ở giữa để đẩy footer xuống */
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-danger mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">My Store_</a>


        <div class="ms-auto d-flex align-items-center">

            <span class="text-white me-3" sec:authorize="isAuthenticated()">
                User: <span sec:authentication="name"></span> |
                Role: <span th:text="${#authentication.authorities[0].authority}"></span>
            </span>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm" type="submit">
                    Logout
                </button>
            </form>

        </div>

    </div>
</nav>

<div class="content-wrapper">
    <div class="container">
        <div layout:fragment="content"></div>
    </div>
</div>

<footer class="text-center py-3 border-top bg-light">
    <p class="mb-0">&copy; 2026 - Phát triển ứng dụng với J2EE</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
